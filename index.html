<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lioren Technologies — Deterministic solutions for real‑time, safety‑critical systems</title>
  <meta name="description" content="Deterministic safety layers for embedded and cyber‑physical systems. Threshold Symbolic Collapse (TSC), Sohvie Drive, and verifiable calibration for certification‑ready deployments." />
  <link rel="icon" href="/favicon.ico" />

  <!-- Fonts & Tailwind -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: Inter, ui-sans-serif, system-ui; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-800">
  <!-- Header -->
  <header class="sticky top-0 z-40 w-full bg-white/90 backdrop-blur border-b border-gray-200" role="banner">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex h-20 items-center justify-between">
        <a href="#" class="flex items-center gap-3" aria-label="Lioren Technologies home">
          <img src="./Lioren-logo.jpg" alt="Lioren Technologies logo" width="48" height="48" class="h-12 w-12 object-contain" />
          <span class="text-gray-900 font-extrabold tracking-tight">Lioren Technologies</span>
        </a>
        <nav class="hidden md:flex items-center space-x-10 text-sm font-medium" aria-label="Primary">
          <a href="#solutions" class="text-gray-600 hover:text-gray-900">Solutions</a>
          <a href="#services" class="text-gray-600 hover:text-gray-900">Services</a>
          <a href="#about" class="text-gray-600 hover:text-gray-900">About</a>
          <a href="#contact" class="text-gray-600 hover:text-gray-900">Contact</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="relative min-h-[70vh] bg-gray-900 text-white flex items-center justify-center text-center">
    <div class="absolute inset-0 -z-10">
      <img src="./infinity-logo.png" alt="Infinity symbol" class="w-full h-full object-cover opacity-80" />
      <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-gray-900/60 to-transparent" aria-hidden="true"></div>
    </div>
    <div class="px-4 max-w-3xl">
      <h1 class="text-4xl sm:text-6xl md:text-7xl font-extrabold tracking-tight">Innovate. Create. Transform.</h1>
      <p class="mt-6 text-lg text-gray-300">Deterministic safety for real‑time, safety‑critical systems.</p>
    </div>
  </section>

  <!-- Sections (Solutions, Services, About, Contact) -->
  <main id="main">
    <!-- Solutions placeholder -->
    <section id="solutions" class="py-24 bg-white">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="text-center">
          <h2 class="text-3xl font-bold tracking-tight sm:text-4xl">Technology for critical systems</h2>
          <p class="mt-4 text-lg text-gray-600">Core technologies built for reliability, traceability, and certification.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-white" role="contentinfo">
    <div class="mx-auto max-w-7xl py-12 px-4 sm:px-6 lg:px-8">
      <div class="flex justify-center">
        <img class="h-10 w-10 object-contain" src="./Lioren-logo.jpg" alt="Lioren Technologies logo" width="40" height="40" />
      </div>
      <p class="mt-8 text-center text-sm text-gray-500">© <span id="current-year"></span> Lioren Technologies. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.getElementById('current-year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
