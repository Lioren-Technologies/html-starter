<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lioren Technologies | AI Entropy Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000; 
            overflow-x: hidden;
        }

        /* The Stack: Centers the entire column of slides */
        .slide-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* The Fix: Limits the image size so it doesn't stretch and blur */
        .slide-stack img {
            width: auto;
            max-width: 90%; /* Leaves a small margin so it doesn't hit the edges */
            height: auto;
            max-height: 95vh; /* Ensures the slide doesn't get taller than the screen */
            display: block;
            margin: 0 auto;
        }

        .footer-section {
            background-color: #000000;
            padding: 100px 20px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="slide-stack">
        <img src="agnostic deck .pptx.jpg" alt="Slide 1">
        <img src="agnostic deck .pptx (1).jpg" alt="Slide 2">
        <img src="agnostic deck .pptx (2).jpg" alt="Slide 3">
        <img src="agnostic deck .pptx (3).jpg" alt="Slide 4">
        <img src="agnostic deck .pptx (4).jpg" alt="Slide 5">
        <img src="agnostic deck .pptx (5).jpg" alt="Slide 6">
    </div>

    <div class="footer-section">
        <h2 class="text-3xl md:text-5xl font-black mb-6 tracking-tighter uppercase text-indigo-400">
            Deterministic Governance
        </h2>
        <div class="mb-10">
            <a href="mailto:casey@liorentechnologies.com" class="inline-block px-12 py-5 bg-indigo-600 text-white font-black rounded-none text-xl hover:bg-indigo-500 transition-all border-2 border-indigo-300">
                CONTACT US
            </a>
        </div>
        <div class="text-sm text-gray-400 tracking-[0.4em] uppercase font-bold">
            © 2026 LIOREN TECHNOLOGIES
        </div>
    </div>

</body>
</html>
